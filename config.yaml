data:
  data_dir: ./2026spring-sdsc6001-hw4
  train_csv: train.csv
  unlabel_csv: train_unlabel.csv
  test_csv: test.csv
  sample_submission: sample_submission.csv

output:
  result_root: results          # each run -> results/<timestamp>/

seed: 42

preprocess:
  sen_len: 400                 # p95 of token lengths is ~714; 400 with head+tail covers almost everything
  lowercase: true
  min_count: 3
  head_ratio: 0.3              # for reviews > sen_len, keep 30% head + 70% tail (verdict usually near the end)
  w2v_vector_size: 300
  w2v_window: 8
  w2v_epochs: 20
  w2v_sg: 1                    # skip-gram
  w2v_negative: 10
  w2v_workers: 8
  w2v_sample: 1.0e-4           # subsample overly frequent words (the / of / and ...)
  # If given, skip training w2v and reuse cached model
  w2v_cache_path: "results/20260510_212731_92.00/w2v.model"

model:
  hidden_dim: 256              # v3 (H): 192->256, scale up LM/classifier capacity for ppl<90 target
  num_layers: 2
  dropout: 0.4                 # v3.6: 0.5->0.4; BiLM (RUN 193928) reached 94.35 with train acc 97.41 unsaturated. With richer init from forward+backward LM, classifier dropout can shrink further.
  embed_dropout: 0.4           # v3.3: 0.5->0.4, RUN 152636 r2 train acc 97.20 unsaturated; embedding (22M params) has headroom
  embed_noise_std: 0.20        # A2: 0.15->0.20, stronger Gaussian noise on embeddings
  bidirectional: true
  fix_embedding: false         # fine-tune embedding for better acc
  pool: attn_max_mean          # rolled back to single-head for stable baseline 92.35; multi-head kept in code for LM-era ablation
  attn_heads: 4                # ignored when pool=attn_max_mean
  locked_dropout: 0.0          # v3.2: 0.25->0.0, RUN 145552 (F-only) showed -0.45pp regression vs A+H baseline (93.28 vs 93.73). F over-regularizes on top of existing dropout stack.
  weight_drop: 0.0             # v3.1: 0.30->0.0, EMA × WeightDrop incompatibility caused self-train degradation in RUN 042539 (-0.74pp final).

train:
  batch_size: 64
  epochs: 23                   # v3: 20->23 (RUN 235337 phase B was truncated to 17 ep, cosine hit 0 while train acc still rising at 88.9)
  lr: 5.0e-4                   # B: lower init lr to slow down overfitting
  weight_decay: 3.0e-4         # A2: 1e-4->3e-4, stronger decoupled weight decay (AdamW)
  grad_clip: 1.0
  val_ratio: 0.15              # raised from 0.10: 2500→3750 val, halves stddev of val acc estimate
  early_stop_patience: 6       # A2: 10->6, cut plateau tail (prev acc plateaued 10+ epochs)
  lr_scheduler: warmup_cosine  # plateau | cosine | warmup_cosine | none
  lr_factor: 0.5               # used only by plateau
  lr_patience: 1               # used only by plateau
  warmup_ratio: 0.06
  ema_decay: 0.996             # B2: 0.999->0.996, faster shadow tracking (half-life ~0.5 epoch vs ~2)
  ema_warmup_epochs: 2         # don't pick EMA ckpt until shadow has warmed up
  word_dropout: 0.25           # A: stronger token-level dropout
  label_smoothing: 0.05        # C: soften BCE targets to reduce miscalibration / overfit
  # Discriminative LR — only takes effect when an LM ckpt is loaded.
  # Safe to leave on: it is a no-op when no LM is loaded (single-LR fallback).
  use_discriminative_lr: true
  lr_embedding: 1.0e-4         # v3: 5e-5->1e-4 (RUN 235337 train acc 88.9 < val 91.5, embedding underfit; embed=22M params dominates)
  lr_lstm: 3.0e-4              # v2: 1e-4->3e-4 (same reason)
  lr_head: 5.0e-4              # full update for randomly-initialized attn + classifier head
  # Gradual unfreezing (ULMFiT-style). Phase A: head-only warmup with frozen body
  # for K epochs at lr_head_warmup; Phase B: unfreeze + disc-LR for the remaining
  # (epochs - K) epochs. No-op unless LM is loaded and use_discriminative_lr=true.
  freeze_body_epochs: 2        # v3: 3->2 (RUN 235337 phase A epoch 3 produced no new best; epoch 2 already at 88.61)
  lr_head_warmup: 1.0e-3       # higher LR for head while body is frozen

lm:
  # LSTM Language-Model pretraining (see LSTM_LM_DESIGN.md).
  # ckpt_path: leave null and use `--lm <path>` CLI flag (preferred, keeps yaml clean).
  ckpt_path: null              # e.g. ./results_lm/<ts>/lm_ckpt.pt
  hidden_dim: 256              # v3 (H): MUST match model.hidden_dim (192->256)
  num_layers: 2                # MUST match model.num_layers
  embed_dropout: 0.2          # v2: 0.3->0.2, v1 train PPL 146 > val PPL 122 suggests over-regularization
  dropout: 0.3                # v2: 0.4->0.3, same reason
  locked_dropout: 0.0         # v3.5: F+E disabled, RUN 163505 confirmed F+E slows convergence too much for 18.7M-token IMDB LM (proj. final ppl ~97 vs baseline 92.32). AWD-LSTM recipe targets PTB/WT2 (1-2M tok), regime mismatch.
  weight_drop: 0.0            # v3.5: see locked_dropout note
  tie_weights: true
  init_from_w2v: true
  bptt_len: 192                # v3 (A): 128->192, reviews avg 260 tok; longer ctx helps LM learn sentence-level deps
  val_ratio: 0.05              # 5% of unlabeled docs (no labeled docs in LM val/train; design section 4.3)
  val_source: unlabeled_only
  include_labeled_in_train: false  # keep classifier val text entirely out of LM
  include_test_in_train: true      # transductive — test text (no labels) is fine
  batch_size: 32              # v3.1: 64->32, OOM at 256d/bptt192
  epochs: 30                  # v3 (A): 16->30, RUN 220750 hit ppl 104.86 at ep16 still trending down; let cosine fully run
  lr: 1.0e-3
  weight_decay: 1.0e-6
  grad_clip: 0.5
  warmup_ratio: 0.05
  early_stop_patience: 6      # v3 (A): 3->6, accommodate longer cosine tail
  seed: 42

self_training:
  enable: true
  rounds: 3                    # v3.3: 2->3; RUN 152636 r2 ep8 peak 93.92 still climbing, give r3 a chance with cleaner pseudo
  pos_threshold: 0.95          # v3.3: 0.93->0.95, model is stronger now (93.9), pseudo noise is the bottleneck for r3
  neg_threshold: 0.05          # v3.3: 0.07->0.05, mirror of pos_threshold
  max_pseudo_per_round: 15000  # smaller cap so r1 doesn't drain all confident pos in one round
  balance_pseudo: true         # take equal #pos and #neg each round
  finetune_epochs: 10          # was 5 — cosine hit lr=0 while val was still rising
  finetune_lr: 2.5e-4          # higher: LS lifts train loss floor (~0.15), need more lr to fine-tune

inference:
  batch_size: 256
