data:
  data_dir: ./2026spring-sdsc6001-hw4
  train_csv: train.csv
  unlabel_csv: train_unlabel.csv
  test_csv: test.csv
  sample_submission: sample_submission.csv

output:
  result_root: results          # each run -> results/<timestamp>/

seed: 42

preprocess:
  sen_len: 400                 # p95 of token lengths is ~714; 400 with head+tail covers almost everything
  lowercase: true
  min_count: 3
  head_ratio: 0.3              # for reviews > sen_len, keep 30% head + 70% tail (verdict usually near the end)
  w2v_vector_size: 300
  w2v_window: 8
  w2v_epochs: 20
  w2v_sg: 1                    # skip-gram
  w2v_negative: 10
  w2v_workers: 8
  w2v_sample: 1.0e-4           # subsample overly frequent words (the / of / and ...)
  # If given, skip training w2v and reuse cached model
  w2v_cache_path: null

model:
  hidden_dim: 256
  num_layers: 2
  dropout: 0.55                # intra-LSTM + classifier dropout
  embed_dropout: 0.4
  embed_noise_std: 0.10        # Gaussian noise on embeddings during training
  bidirectional: true
  fix_embedding: false         # fine-tune embedding for better acc
  pool: attn_max_mean          # concat of attention / max / mean pooling

train:
  batch_size: 64
  epochs: 25
  lr: 8.0e-4
  weight_decay: 5.0e-5         # stronger decoupled weight decay (AdamW)
  grad_clip: 1.0
  val_ratio: 0.1
  early_stop_patience: 6       # let cosine fully decay before bailing
  lr_scheduler: warmup_cosine  # plateau | cosine | warmup_cosine | none
  lr_factor: 0.5               # used only by plateau
  lr_patience: 1               # used only by plateau
  warmup_ratio: 0.06
  ema_decay: 0.999             # EMA of weights; single model, so ensemble-rule compliant
  ema_warmup_epochs: 2         # don't pick EMA ckpt until shadow has warmed up
  word_dropout: 0.20           # randomly replace tokens with <UNK> during training

self_training:
  enable: true
  rounds: 2                    # how many self-training rounds
  pos_threshold: 0.95          # stricter -> cleaner pseudo labels
  neg_threshold: 0.05
  max_pseudo_per_round: 20000  # cap number of pseudo samples added (balanced)
  balance_pseudo: true         # take equal #pos and #neg each round
  finetune_epochs: 5           # epochs for each self-training round
  finetune_lr: 1.5e-4          # well below initial lr to prevent re-overfitting

inference:
  batch_size: 256
